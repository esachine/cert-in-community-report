name: Update CERT-In brief

# Rebuilds the community brief on a schedule and commits the refreshed
# HTML/JSON. Use this if your host only serves static files.

on:
  schedule:
    - cron: "30 3 * * *" # 09:00 IST daily (03:30 UTC)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build the brief (delta)
        run: node scripts/certin/build.js

      - name: Commit updated brief
        run: |
          git config user.name "brief-bot"
          git config user.email "brief-bot@users.noreply.github.com"
          git add data public
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update CERT-In brief ($(date -u +%Y-%m-%d))"
            git push
          fi
